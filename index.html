<!DOCTYPE html>

<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Letters for Me 💌</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="envelope">

        💌

    </div>

    <h1>Letters for Me</h1>

    <p class="subtitle">

        Иногда несколько искренних слов<br>

        остаются в памяти навсегда.

    </p>

    <button id="openBtn">

        Открыть письмо ✨

    </button>

    <div id="letter" class="hidden">

        <h2>Напиши мне письмо 🤍</h2>

        <input

            type="text"

            id="name"

            placeholder="Твоё имя (необязательно)"

        >

        <textarea

            id="message"

            placeholder="Напиши своё пожелание..."

        ></textarea>

        <button id="sendBtn">

            Отправить 💌

        </button>

    </div>

    <p id="success" class="hidden">

        ❤️ Спасибо!<br>

        Твоё письмо уже отправлено.

    </p>

</div>

<script src="script.js"></script>

</body>

</html>
